apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: makemkv
  namespace: default
spec:
  ingressClassName: traefik
  rules:
    - host: ${MAKEMKV_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: makemkv
                port:
                  number: 5800
