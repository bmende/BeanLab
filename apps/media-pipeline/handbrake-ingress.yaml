apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: handbrake
  namespace: default
spec:
  ingressClassName: traefik
  rules:
    - host: ${HANDBRAKE_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: handbrake
                port:
                  number: 5800
