# Replace <AGENT_NODE_IP> with the agent node's LAN IP address
apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-nfs
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-media
  nfs:
    server: <AGENT_NODE_IP>
    path: /srv/media
    readOnly: false
