apiVersion: apps/v1
kind: Deployment
metadata:
  name: coredns-lan
  namespace: dns
  labels:
    app: coredns-lan
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: coredns-lan
  template:
    metadata:
      labels:
        app: coredns-lan
    spec:
      nodeSelector:
        node-role.beanlab/streaming: "true"
      containers:
        - name: coredns
          image: coredns/coredns:1.14.2
          args:
            - -conf
            - /etc/coredns/Corefile
          ports:
            - name: dns-udp
              containerPort: 53
              hostPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              hostPort: 53
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/coredns
              readOnly: true
            - name: zones
              mountPath: /data/zones
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - NET_BIND_SERVICE
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
      volumes:
        - name: config
          configMap:
            name: coredns-lan
        - name: zones
          hostPath:
            path: /etc/coredns-lan/zones
            type: DirectoryOrCreate
